name: tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,indicators,html]"

      - name: Lint with ruff
        run: ruff check cbsrm tests
        continue-on-error: true   # warning-only on initial CI bring-up

      - name: Run pytest
        run: pytest tests/ -v --cov=cbsrm --cov-report=term-missing

      - name: Verify CLI installs
        run: |
          cbsrm info

  whitepaper-link-check:
    name: Whitepaper link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check whitepaper markdown for broken local refs
        run: |
          # Trivial grep — ensure no obvious TODO/FIXME left in the published paper
          if grep -nE '\bTODO\b|\bFIXME\b|\bXXX\b' whitepaper/cbsrm_methodology_v1.md; then
            echo "::warning::Whitepaper still has TODO/FIXME markers"
            exit 0
          fi
          echo "Whitepaper clean."
